version: '3.8'
services:
  mysql:
    image: mysql:8.0.29
    restart: unless-stopped
    container_name: mysql
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: "123"
      MYSQL_DATABASE: aluguel_carros
    volumes:
      - .db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123"]
      timeout: 5s
      retries: 10
      interval: 5s
  web:
    build:
      context: . 
      dockerfile: dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
    depends_on:
      mysql:
        condition: service_healthy