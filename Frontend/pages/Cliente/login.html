<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy Car - Entrar</title>
    <link rel="stylesheet" href="../../css/ui.css">
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../JS/auth.js" defer></script>
</head>

<body id="login_cliente">
    <main class="auth-wrapper">
        <section class="auth-box">
            <header class="auth-header">
                <div class="logo">EC</div>
                <h1 class="auth-title">Eazy Car</h1>
                <p class="auth-subtitle">Acesse sua Conta</p>
            </header>

            <form class="card" onsubmit="event.preventDefault(); autenticar_login();">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" placeholder="usuario@exemplo.com" id="email" required>
                </div>

                <div class="field" style="margin-top:16px;">
                    <label for="senha">Senha</label>
                    <input type="password" placeholder="********" id="senha" required>
                </div>

                <button class="btn" type="submit">Entrar</button>

                <p class="auth-footer">
                    Não tem uma conta?
                    <a href="cadastro.html">Criar Conta</a>
                </p>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-column">
                <h4>Eazy Car</h4>
                <ul>
                    <li><a href="../../index.html">Início</a></li>
                    <li><a href="../../pages/minhas_reservas.html">Reservas</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h4>Suporte</h4>
                <ul>
                    <li><a href="tel:+123456770">📞 +123 456 6770</a></li>
                    <li><a href="mailto:envio@eazycar.com">✉️ envio@eazycar.com</a></li>
                </ul>
            </div>
            <div class="footer-column logo-footer">
                <div class="footer-logo">
                    <img src="../../assets/icone_EasyCar.png" alt="EazyCar Logo" class="logo-icon">
                    <span>Eazy<span class="logo-highlight">Car</span></span>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 EazyCar. Todos os direitos reservados. | Desenvolvido por EazyCar</p>
        </div>
    </footer>

</body>
</html>
