<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy Car - Criar Conta</title>
    <link rel="stylesheet" href="../../css/ui.css">
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../JS/Cliente/cadastro.js" defer></script>
</head>

<body>
    <!-- Header/Navbar -->
    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="../../index.html">
                    <img src="../../assets/icone_EasyCar.png" alt="EazyCar Logo" class="logo-icon">
                    <span class="logo-text">Eazy<span class="logo-highlight">Car</span></span>
                </a>
            </div>
            <nav class="navbar-menu">
                <a href="../../index.html" class="nav-link active">Início</a>
                <a href="../../pages/minhas_reservas.html" class="nav-link">Reservas</a>
                <a href="../../pages/veiculos.html" class="nav-link">Frotas</a>
                <a href="../../pages/Cliente/login.html" class="nav-link">Conta</a>
            </nav>
            <div class="navbar-auth">
                <a href="../../pages/Cliente/login.html" class="btn-login">Entrar</a>
                <a href="../../pages/Cliente/cadastro.html" class="btn-signup">Cadastre-se</a>
            </div>
        </div>
    </header>

    <main class="auth-wrapper">
        <section class="auth-box">
            <header class="auth-header">
                <div class="logo">EC</div>
                <h1 class="auth-title">Criar Conta</h1>
                <p class="auth-subtitle">Junte-se à Eazy Car</p>
            </header>

            <form class="card" onsubmit="event.preventDefault(); validar_dados();">
                <div class="form-grid">
                    <div class="field">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu Nome" required>
                    </div>

                    <div class="field">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="usuario@exemplo.com" required>
                    </div>

                    <div class="field">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="********" required>
                    </div>

                    <div class="field">
                        <label for="celular">Celular</label>
                        <input type="text" id="celular" placeholder="(00) 00000-0000" required>
                    </div>

                    <div class="field">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000" required>
                    </div>

                    <div class="field field-full">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" placeholder="Rua/Avenida" required>
                    </div>

                    <div class="field">
                        <label for="numero">Número</label>
                        <input type="number" id="numero" placeholder="123" required>
                    </div>

                    <div class="field">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" placeholder="">
                    </div>
                </div>

                <button class="btn" type="submit">Criar Conta</button>

                <p class="auth-footer">
                    Já tem uma conta?
                    <a href="login.html">Entrar</a>
                </p>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-column">
                <h4>Eazy Car</h4>
                <ul>
                    <li><a href="../../index.html">Início</a></li>
                    <li><a href="../../pages/minhas_reservas.html">Reservas</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h4>Suporte</h4>
                <ul>
                    <li><a href="tel:+123456770">📞 +123 456 6770</a></li>
                    <li><a href="mailto:envio@eazycar.com">✉️ envio@eazycar.com</a></li>
                </ul>
            </div>
            <div class="footer-column logo-footer">
                <div class="footer-logo">
                    <img src="../../assets/icone_EasyCar.png" alt="EazyCar Logo" class="logo-icon">
                    <span>Eazy<span class="logo-highlight">Car</span></span>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 EazyCar. Todos os direitos reservados. | Desenvolvido por EazyCar</p>
        </div>
    </footer>

</body>
</html>
