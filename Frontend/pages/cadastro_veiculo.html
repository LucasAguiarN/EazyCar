<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar Pro - New Vehicle</title>
    <link rel="stylesheet" href="../css/ui.css">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">RC</div>
                <span>RentCar Pro</span>
            </div>

            <nav>
                <ul class="menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="listar_veiculos.html">Vehicles</a></li>
                    <li><a href="cadastro_veiculo.html" class="active">New Vehicle</a></li>
                </ul>
            </nav>

            <a class="logout" href="login.html">Logout</a>
        </aside>

        <main class="main">
            <header class="topbar">Car Rental Management</header>

            <section class="content">
                <h1>New Vehicle</h1>
                <p>Add a car to your fleet</p>

                <form class="card">
                    <div class="form-grid">
                        <div class="field">
                            <label for="marca">Brand</label>
                            <input type="text" id="marca" placeholder="Toyota">
                        </div>

                        <div class="field">
                            <label for="modelo">Model</label>
                            <input type="text" id="modelo" placeholder="Corolla">
                        </div>

                        <div class="field">
                            <label for="ano">Year</label>
                            <input type="number" id="ano" placeholder="2024">
                        </div>

                        <div class="field">
                            <label for="placa">Plate</label>
                            <input type="text" id="placa" placeholder="ABC-1234">
                        </div>

                        <div class="field field-full">
                            <label for="status">Status</label>
                            <select id="status">
                                <option>Available</option>
                                <option>Rented</option>
                                <option>Maintenance</option>
                            </select>
                        </div>
                    </div>

                    <button class="btn" type="submit">Create Vehicle</button>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
