<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
    <link rel='stylesheet' type='text/css' media='screen' href='../css/ui.css'>
    <script src='../JS/conta_cliente.js' defer></script>
</head>
<body>
    <button class="btn" id="btn_deletar">Teste Deletar Conta</button>

    <form class="card" onsubmit="event.preventDefault(); atualizar_conta();">
        <div class="form-grid">
            <div class="field">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu Nome" required>
            </div>

            <div class="field">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="usuario@exemplo.com" required>
            </div>

            <div class="field">
                <label for="celular">Celular</label>
                <input type="text" id="celular" placeholder="(00) 00000-0000" required>
            </div>

            <div class="field">
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="00000-000" required onchange="buscar_endereco()">
            </div>

            <div class="field field-full">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" placeholder="Rua/Avenida" required>
            </div>

            <div class="field">
                <label for="numero">Número</label>
                <input type="number" id="numero" placeholder="123" required>
            </div>

            <div class="field">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" placeholder="">
            </div>
        </div>

                <button class="btn" type="submit">Atualizar Conta</button>
            </form>
</body>
</html>
