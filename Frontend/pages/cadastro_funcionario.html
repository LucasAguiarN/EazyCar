<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy Car - Cadastro Funcionário</title>
    <link rel="stylesheet" href="../css/ui.css">
    <script src="../JS/cadastro_funcionario.js" defer></script>
</head>

<body>
    <main class="auth-wrapper">
        <section class="auth-box">
            <header class="auth-header">
                <div class="logo">EC</div>
                <h1 class="auth-title">Cadastrar Funcionário</h1>
            </header>

            <form class="card" onsubmit="event.preventDefault(); enviar_cadastro();">
                <div class="form-grid">
                    <div class="field">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu Nome" required>
                    </div>

                    <div class="field">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="usuario@exemplo.com" required>
                    </div>

                    <div class="field">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="********" required>
                    </div>

                    <div class="field">
                        <label for="celular">Celular</label>
                        <input type="text" id="celular" placeholder="(00) 00000-0000" required>
                    </div>

                    <div class="field">
                        <label for="cep">Cargo</label>
                        <input type="text" id="cep" placeholder="Ex: Atendente" required>
                    </div>
                </div>

                <button class="btn" type="submit">Cadastrar Funcionário</button>

                <p class="auth-footer">
                    Já tem uma conta?
                    <a href="login_sistema.html">Entrar</a>
                </p>
            </form>
        </section>
    </main>

</body>
</html>
