<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EazyCar - Painel</title>
    <link rel="stylesheet" href="../css/ui.css">
    <script defer src="../js/veiculos.js"></script>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark" aria-label="EazyCar">
                    <span class="brand-eazy">Eazy</span><span class="brand-car">Car</span>
                </div>
            </div>

            <nav>
                <ul class="menu">
                    <li><a href="dashboard.html" class="active">Painel</a></li>
                    <li><a href="listar_veiculos.html">Veículos</a></li>
                    <li><a href="cadastro_veiculo.html">Novo Veículo</a></li>
                </ul>
            </nav>

            <a class="logout" href="#" id="btn_logout">Sair</a>
        </aside>

        <main class="main">
            <header class="topbar">EazyCar • Gestão de Aluguel de Carros</header>

            <section class="content">
                <h1>Painel</h1>
                <p>Visão geral da sua frota</p>

                <div class="stats">
                    <article class="stat">
                        <div class="stat-title">Total de Veículos</div>
                        <div class="stat-value" id="stat_total">—</div>
                    </article>
                    <article class="stat">
                        <div class="stat-title">Disponíveis</div>
                        <div class="stat-value" id="stat_disponiveis">—</div>
                    </article>
                    <article class="stat">
                        <div class="stat-title">Alugados</div>
                        <div class="stat-value" id="stat_alugados">—</div>
                    </article>
                    <article class="stat">
                        <div class="stat-title">Manutenção</div>
                        <div class="stat-value" id="stat_manutencao">—</div>
                    </article>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
