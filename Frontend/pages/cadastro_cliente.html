<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar Pro - Create Account</title>
    <link rel="stylesheet" href="../css/ui.css">
    <script src="../JS/cliente.js" defer></script>
</head>

<body>
    <main class="auth-wrapper">
        <section class="auth-box">
            <header class="auth-header">
                <div class="logo">RC</div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join RentCar Pro</p>
            </header>

            <form class="card" onsubmit="event.preventDefault(); validar_dados();">
                <div class="form-grid">
                    <div class="field">
                        <label for="nome">Full Name</label>
                        <input type="text" id="nome" placeholder="John Doe" required>
                    </div>

                    <div class="field">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="field">
                        <label for="senha">Password</label>
                        <input type="password" id="senha" placeholder="********" required>
                    </div>

                    <div class="field">
                        <label for="celular">Phone</label>
                        <input type="text" id="celular" placeholder="(00) 00000-0000" required>
                    </div>

                    <div class="field">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000" required>
                    </div>

                    <div class="field field-full">
                        <label for="endereco">Address</label>
                        <input type="text" id="endereco" placeholder="Street name" required>
                    </div>

                    <div class="field">
                        <label for="numero">Number</label>
                        <input type="number" id="numero" placeholder="123" required>
                    </div>

                    <div class="field">
                        <label for="complemento">Complement</label>
                        <input type="text" id="complemento" placeholder="Apt 4B">
                    </div>
                </div>

                <button class="btn" type="submit">Create Account</button>

                <p class="auth-footer">
                    Already have an account?
                    <a href="login.html">Sign in</a>
                </p>
            </form>
        </section>
    </main>

</body>
</html>
