<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Veículo - EazyCar</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/ui.css">
    <link rel="stylesheet" href="../CSS/forms.css">
</head>

<body>

    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="../index.html">
                    <img src="../assets/icone_EasyCar.png" alt="EazyCar Logo" class="logo-icon">
                    <span class="logo-text">Eazy<span class="logo-highlight">Car</span></span>
                </a>
            </div>
            <nav class="navbar-menu">
                <a href="../index.html" class="nav-link">Início</a>
                <a href="minhas_reservas.html" class="nav-link">Reservas</a>
                <a href="veiculos.html" class="nav-link">Frotas</a>
                <a href="Cliente/login.html" class="nav-link">Conta</a>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 100px; min-height: 60vh;">

        <div class="reserve-form-container" style="max-width: 100%; margin-bottom: 50px;">
            <h2>Confirmar Detalhes da Locação</h2>
            <form id="form-datas" class="reserve-form" onsubmit="event.preventDefault();">

                <div class="form-row">
                    <div class="form-group" style="position: relative;">
                        <label for="local_retirada">Local de Retirada</label>
                        <input type="text" id="local_retirada" autocomplete="off" required>
                        <div id="retiradaSuggestions" class="suggestions-list"></div>
                    </div>

                    <div class="form-group" style="position: relative;">
                        <label for="local_devolucao">Local de Devolução</label>
                        <input type="text" id="local_devolucao" autocomplete="off" required>
                        <div id="devolucaoSuggestions" class="suggestions-list"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data_retirada">Data de Retirada</label>
                        <input type="date" id="data_retirada" required>
                    </div>
                    <div class="form-group">
                        <label for="data_devolucao">Data de Devolução</label>
                        <input type="date" id="data_devolucao" required>
                    </div>
                </div>
            </form>
        </div>

        <section class="popular-cars" style="padding-top: 0;">
            <h2>Escolha seu Veículo</h2>
            <hr style="margin-bottom: 40px; border: 1px solid #eee;">
            <div id="lista_veiculos" class="car-types-grid">
                <p>Carregando veículos...</p>
            </div>
        </section>

    </main>
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-column">
                <h4>Eazy Car</h4>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="minhas_reservas.html">Reservas</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h4>Suporte</h4>
                <ul>
                    <li><a href="tel:+123456770">📞 +123 456 6770</a></li>
                    <li><a href="mailto:envio@eazycar.com">✉️ envio@eazycar.com</a></li>
                </ul>
            </div>
            <div class="footer-column logo-footer">
                <div class="footer-logo">
                    <img src="../assets/icone_EasyCar.png" alt="EazyCar Logo" class="logo-icon">
                    <span>Eazy<span class="logo-highlight">Car</span></span>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 EazyCar. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="../JS/reservas.js"></script>
</body>

</html>
